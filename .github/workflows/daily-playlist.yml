name: Daily Pitchfork Playlist

on:
  schedule:
    # Runs Mon-Fri at 6:00 PM UTC (10 AM PT / 1 PM ET)
    # This gives Pitchfork time to publish the day's reviews.
    # Monday's run captures Sat + Sun + Mon.
    - cron: '0 18 * * 1-5'

  # Manual trigger for testing
  workflow_dispatch:

jobs:
  create-playlist:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Create daily playlist
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
        run: node src/index.js
